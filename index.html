<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Veterinární praxe FVL 2025/2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --indigo:    #3f51b5;
  --indigo-dk: #1a237e;
  --indigo-lt: #e8eaf6;
  --green:     #43a047;
  --surface:   #ffffff;
  --bg:        #f0f2f5;
  --text:      #1a1a2e;
  --muted:     #757575;
  --border:    #e0e0e0;
  --radius:    10px;
  --shadow:    0 2px 8px rgba(0,0,0,.10);
  --shadow-md: 0 4px 16px rgba(0,0,0,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;color:var(--text);background:var(--bg);overflow:hidden}

/* ── LAYOUT ─────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100dvh}
#main{display:flex;flex:1;overflow:hidden}

/* ── HEADER ──────────────────────────────────── */
#header{
  background:linear-gradient(135deg,#1a237e 0%,#283593 60%,#3949ab 100%);
  color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px;
  flex-shrink:0;box-shadow:0 2px 10px rgba(0,0,0,.30);z-index:10;position:relative;
  transition:transform .3s ease, opacity .3s ease
}
#header.hidden{transform:translateY(-100%);opacity:0;pointer-events:none}
#header-icon{font-size:1.6rem;line-height:1}
#header-text h1{font-size:.98rem;font-weight:700;letter-spacing:.3px}
#header-text p{font-size:.72rem;opacity:.75;margin-top:1px}
#header-count{
  margin-left:auto;background:rgba(255,255,255,.18);border-radius:20px;
  padding:4px 11px;font-size:.73rem;white-space:nowrap
}

@media(max-width:700px){
  #header{
    padding:6px 12px;
    position:fixed;top:0;left:0;right:0;z-index:100
  }
  #header-icon{font-size:1.2rem}
  #header-text h1{font-size:.85rem}
  #header-text p{display:none}
  #header-count{font-size:.7rem;padding:3px 9px}
  /* push content below fixed header; JS removes this class when header hides */
  #app{padding-top:var(--mob-header-h, 44px)}
  #app.header-hidden{padding-top:0}
}

/* ── SIDEBAR ─────────────────────────────────── */
#sidebar{
  width:340px;display:flex;flex-direction:column;background:var(--surface);
  border-right:1px solid var(--border);flex-shrink:0;overflow:hidden;z-index:5
}

/* ── CONTROLS ────────────────────────────────── */
#controls{padding:10px 12px 8px;background:#fafbff;border-bottom:1px solid #e8eaf6;flex-shrink:0}

.ctrl-label{
  font-size:.67rem;font-weight:700;color:#5c6bc0;text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:4px
}

/* search */
#search-wrap{position:relative;margin-bottom:9px}
#search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
#search{
  width:100%;padding:7px 10px 7px 32px;border:1.5px solid #c5cae9;border-radius:8px;
  font-size:.82rem;outline:none;background:#f8f9ff;transition:border-color .15s,box-shadow .15s
}
#search:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(63,81,181,.15)}

/* category chips */
#cat-filter{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
.cat-btn{
  font-size:.68rem;padding:3px 9px;border:1.5px solid #c5cae9;border-radius:12px;
  cursor:pointer;background:#f5f5ff;color:#3949ab;transition:all .15s;white-space:nowrap;font-weight:600
}
.cat-btn.active{background:var(--indigo);color:#fff;border-color:var(--indigo)}
.cat-btn:hover:not(.active){background:#e8eaf6}

/* distance */
#dist-row{display:flex;gap:6px;margin-bottom:6px}
#dist-input{
  flex:1;padding:6px 10px;border:1.5px solid #c5cae9;border-radius:8px;
  font-size:.8rem;outline:none;background:#f8f9ff;min-width:0;
  transition:border-color .15s,box-shadow .15s
}
#dist-input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(63,81,181,.15)}
#gps-btn{
  padding:6px 9px;background:#e8f5e9;border:1.5px solid #a5d6a7;border-radius:8px;
  cursor:pointer;font-size:.78rem;color:#2e7d32;white-space:nowrap;transition:background .15s;flex-shrink:0
}
#gps-btn:hover{background:#c8e6c9}

#dist-km-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
#dist-km-row label{font-size:.75rem;color:var(--muted);white-space:nowrap}
#dist-km{
  width:64px;padding:5px 8px;border:1.5px solid #c5cae9;border-radius:8px;
  font-size:.8rem;text-align:center;outline:none;background:#f8f9ff;
  transition:border-color .15s
}
#dist-km:focus{border-color:var(--indigo)}
#apply-dist{
  padding:5px 12px;background:var(--indigo);color:#fff;border:none;border-radius:8px;
  cursor:pointer;font-size:.75rem;font-weight:700;transition:background .15s
}
#apply-dist:hover{background:var(--indigo-dk)}
#clear-dist{
  padding:5px 8px;background:#f5f5f5;border:1.5px solid #ddd;border-radius:8px;
  cursor:pointer;font-size:.75rem;color:#666;transition:background .15s
}
#clear-dist:hover{background:#ebebeb}
#dist-info{
  display:none;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:7px;
  padding:5px 9px;font-size:.72rem;color:#2e7d32;margin-bottom:6px
}
#dist-section{
  padding:10px 12px 8px;background:#f5f7ff;
  border-top:2px solid #c5cae9;flex-shrink:0
}

/* sort */
#sort-row{display:flex;gap:6px;align-items:center}
#sort-sel{
  flex:1;padding:6px 9px;border:1.5px solid #c5cae9;border-radius:8px;
  font-size:.8rem;outline:none;background:#f8f9ff;transition:border-color .15s
}
#sort-sel:focus{border-color:var(--indigo)}
#result-count{font-size:.7rem;color:#7986cb;margin-top:6px}
#map-filter-row{
  display:flex;align-items:center;gap:7px;margin-top:7px;
  font-size:.75rem;color:#3949ab;cursor:pointer;user-select:none;font-weight:600
}
#map-filter-row input{accent-color:var(--indigo);width:14px;height:14px;cursor:pointer;flex-shrink:0}

/* ── LIST ────────────────────────────────────── */
#list-wrap{flex:1;overflow-y:auto;padding:7px 8px}
#list-wrap::-webkit-scrollbar{width:4px}
#list-wrap::-webkit-scrollbar-track{background:#f0f2f5}
#list-wrap::-webkit-scrollbar-thumb{background:#c5cae9;border-radius:2px}

.vet-card{
  background:#fff;border:1.5px solid #e8eaf6;border-radius:var(--radius);
  padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s;
  border-left:4px solid #9fa8da
}
.vet-card:hover{border-color:#5c6bc0;box-shadow:var(--shadow-md);transform:translateY(-1px)}
.vet-card.selected{border-color:var(--indigo);background:#f0f4ff;box-shadow:0 2px 10px rgba(63,81,181,.2)}
.card-name{font-size:.85rem;font-weight:700;color:var(--indigo-dk);margin-bottom:2px}
.card-clinic{font-size:.75rem;color:#5c6bc0;margin-bottom:3px;font-style:italic}
.card-addr{font-size:.72rem;color:#555;margin-bottom:4px}
.card-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.cat-badge{font-size:.63rem;padding:2px 7px;border-radius:8px;font-weight:700}
.dist-badge{font-size:.71rem;color:var(--green);font-weight:700}
.contract-badge{font-size:.63rem;color:#9e9e9e}
.card-links{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.card-links a{
  font-size:.7rem;color:var(--indigo);text-decoration:none;border:1px solid #c5cae9;
  border-radius:5px;padding:2px 7px;transition:all .13s
}
.card-links a:hover{background:var(--indigo);color:#fff;border-color:var(--indigo)}
.no-results{padding:28px 16px;text-align:center;color:var(--muted);font-size:.88rem}

/* ── MAP ─────────────────────────────────────── */
#map{flex:1;z-index:0}

/* ── POPUP ───────────────────────────────────── */
.leaflet-popup-content{min-width:200px;max-width:260px}
.pu-name{font-weight:700;font-size:.9rem;color:var(--indigo-dk);margin-bottom:3px}
.pu-clinic{font-size:.77rem;color:#5c6bc0;font-style:italic;margin-bottom:4px}
.pu-row{font-size:.74rem;margin-bottom:2px;color:#333}
.pu-row a{color:var(--indigo);text-decoration:none}
.pu-row a:hover{text-decoration:underline}
.pu-badge{font-size:.63rem;font-weight:700;margin-top:6px;padding:2px 7px;border-radius:6px;display:inline-block}

/* ── MOBILE TAB BAR ──────────────────────────── */
#tab-bar{display:none}
#collapse-btn{display:none}

@media(max-width:700px){
  /* room for tab bar */
  #app{padding-bottom:56px}

  /* tab bar */
  #tab-bar{
    display:flex;position:fixed;bottom:0;left:0;right:0;height:56px;z-index:2000;
    background:#fff;border-top:1px solid var(--border);
    box-shadow:0 -2px 10px rgba(0,0,0,.10)
  }
  .tab-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;border:none;background:transparent;cursor:pointer;
    font-size:.68rem;font-weight:600;color:var(--muted);transition:color .15s;padding:6px 0
  }
  .tab-btn .tab-icon{font-size:1.25rem;line-height:1}
  .tab-btn.active{color:var(--indigo)}
  .tab-btn.active .tab-line{background:var(--indigo)}
  .tab-line{height:3px;width:32px;border-radius:2px;background:transparent;margin-top:2px;transition:background .15s}

  /* main is a stacking context; children overlap */
  #main{position:relative;flex:1;overflow:hidden}

  /* map: full area, hidden when list tab active */
  #map{
    position:absolute;inset:0;
    transition:opacity .2s
  }
  #main.show-list #map{
    pointer-events:none;opacity:0
  }

  /* sidebar: full area, scrollable, hidden when map tab active */
  #sidebar{
    position:absolute;inset:0;width:100%;
    display:flex;flex-direction:column;
    border-right:none;z-index:10;
    transform:translateX(100%);transition:transform .25s ease
  }
  #main.show-list #sidebar{transform:translateX(0)}

  /* controls + dist-section: limited combined height so list-wrap gets space */
  #controls, #dist-section{flex-shrink:0}
  #sidebar > #controls, #sidebar > #dist-section{overflow-y:visible}
  /* wrap both in a scrollable zone */
  #sidebar{overflow:hidden}
  #controls{overflow-y:auto;max-height:42%;-webkit-overflow-scrolling:touch}
  #dist-section{overflow-y:auto;max-height:20%;-webkit-overflow-scrolling:touch}

  /* list: fills all remaining height, scrollable */
  #list-wrap{
    flex:1;overflow-y:auto;padding:7px 8px;
    -webkit-overflow-scrolling:touch
  }
}
</style>
</head>
<body>
<div id="app">

<div id="header">
  <div id="header-icon">🐾</div>
  <div id="header-text">
    <h1>Veterinární praxe FVL 2025/2026</h1>
    <p>Interaktivní mapa schválených pracovišť</p>
  </div>
  <div id="header-count">Načítám…</div>
</div>

<div id="main">
  <!-- DESKTOP SIDEBAR -->
  <div id="sidebar">
    <div id="collapse-btn" onclick="toggleCollapse()">Seznam praxí</div>
    <div id="controls">
      <div class="ctrl-label">Hledat</div>
      <div id="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#3f51b5" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search" type="search" placeholder="Jméno, město, název ordinace…">
      </div>

      <div class="ctrl-label">Kategorie</div>
      <div id="cat-filter">
        <button class="cat-btn active" data-cat="all">Vše</button>
        <button class="cat-btn active" data-cat="psi_kocky">🐶 Psi a kočky</button>
        <button class="cat-btn active" data-cat="plazi_ptaci_savci">🦎 Plazi/ptáci</button>
        <button class="cat-btn active" data-cat="kone">🐎 Koně</button>
        <button class="cat-btn active" data-cat="drubez">🐔 Drůbež</button>
        <button class="cat-btn active" data-cat="prezyvkavci_prasata">🐄 Přežvýkavci</button>
      </div>

      <div class="ctrl-label">Řazení</div>
      <div id="sort-row">
        <select id="sort-sel">
          <option value="name">Abecedně (A–Z)</option>
          <option value="dist">Vzdálenost (nejbližší)</option>
        </select>
      </div>

      <label id="map-filter-row" title="Zobrazí v seznamu jen praxe viditelné v aktuálním výřezu mapy">
        <input type="checkbox" id="map-filter-toggle" checked> Filtrovat dle výřezu mapy
      </label>
      <div id="result-count"></div>
    </div>

    <div id="dist-section">
      <div class="ctrl-label">Vzdálenost od místa</div>
      <div id="dist-row">
        <input id="dist-input" type="text" placeholder="Zadej město nebo adresu…">
        <button id="gps-btn" title="Použít GPS polohu">📍 GPS</button>
      </div>
      <div id="dist-km-row">
        <label for="dist-km">Max. vzdálenost:</label>
        <input id="dist-km" type="number" min="1" max="500" value="50">
        <span style="font-size:.78rem;color:#666">km</span>
        <button id="apply-dist">Filtrovat</button>
        <button id="clear-dist" title="Zrušit filtr vzdálenosti">✕</button>
      </div>
      <div id="dist-info"></div>
    </div>

    <div id="list-wrap"></div>
  </div>

  <!-- MAP -->
  <div id="map"></div>
</div>

<!-- MOBILE TAB BAR -->
<div id="tab-bar">
  <button class="tab-btn active" id="tab-map" onclick="switchTab('map')">
    <span class="tab-icon">🗺️</span>
    <span>Mapa</span>
    <div class="tab-line"></div>
  </button>
  <button class="tab-btn" id="tab-list" onclick="switchTab('list')">
    <span class="tab-icon">📋</span>
    <span id="tab-list-label">Seznam</span>
    <div class="tab-line"></div>
  </button>
</div>
</div>

  prezyvkavci_prasata: {label:'Přežvýkavci a prasata', color:'#880e4f', bg:'#fce4ec', marker:'#e91e63'},
};

// ── Map init ──────────────────────────────────
const map = L.map('map', {zoomControl:true}).setView([49.8, 15.5], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom:19
}).addTo(map);

// Assign unique _key to every entry (id alone is not unique across sheets)
LOCS.forEach((loc, i) => { loc._key = i; });

// ── State ─────────────────────────────────────
let markers = {};          // _key → L.Marker
let activeId = null;
let activeCats = new Set(Object.keys(CAT));
let distFilter = null;     // {lat,lon,km} or null
let userMarker = null;
let distCircle = null;
let mapFilterActive = true;

// ── Icons ─────────────────────────────────────
function makeIcon(cat, sel=false) {
  const c = (CAT[cat]||{marker:'#555'}).marker;
  const s = sel ? 18 : 13;
  return L.divIcon({
    html:`<div style="width:${s}px;height:${s}px;background:${c};border:${sel?3:2}px solid #fff;border-radius:50%;box-shadow:0 1px ${sel?6:3}px rgba(0,0,0,.5)"></div>`,
    className:'', iconSize:[s,s], iconAnchor:[s/2,s/2], popupAnchor:[0,-s/2]
  });
}

// ── Popup content ─────────────────────────────
function popupHTML(loc) {
  const cat = CAT[loc.kategorie]||{};
  const tel  = loc.telefon && loc.telefon!='None' && loc.telefon ? `<div class="pu-row">📞 <a href="tel:${loc.telefon}">${loc.telefon}</a></div>` : '';
  const mail = loc.email   && loc.email!='None'   && loc.email   ? `<div class="pu-row">✉️ <a href="mailto:${loc.email}">${loc.email}</a></div>` : '';
  const web  = loc.web     && loc.web.startsWith('http')          ? `<div class="pu-row">🌐 <a href="${loc.web}" target="_blank" rel="noopener">Webové stránky</a></div>` : '';
  return `
    <div class="pu-name">${loc.doktor}</div>
    ${loc.nazev && loc.nazev !== loc.doktor ? `<div class="pu-clinic">${loc.nazev}</div>` : ''}
    <div class="pu-row">📍 ${loc.adresa}</div>
    ${tel}${mail}${web}
    <span class="pu-badge" style="background:${cat.bg||'#eee'};color:${cat.color||'#333'}">${cat.label||loc.kategorie}</span>
  `;
}

// ── Init markers ──────────────────────────────
function initMarkers() {
  LOCS.forEach(loc => {
    const m = L.marker([loc.lat, loc.lon], {icon: makeIcon(loc.kategorie)});
    m.bindPopup(popupHTML(loc), {maxWidth:280});
    m.on('click', () => setActive(loc._key, false));
    markers[loc._key] = m;
    m.addTo(map);
  });
}

function setActive(key, pan=true) {
  if (activeId != null && markers[activeId]) {
    const prev = LOCS.find(l=>l._key===activeId);
    if (prev) markers[activeId].setIcon(makeIcon(prev.kategorie, false));
  }
  activeId = key;
  const loc = LOCS.find(l=>l._key===key);
  if (!loc || !markers[key]) return;
  markers[key].setIcon(makeIcon(loc.kategorie, true));
  markers[key].openPopup();
  if (pan) map.panTo([loc.lat, loc.lon]);
  document.querySelectorAll('.vet-card').forEach(c=>c.classList.toggle('selected', +c.dataset.key===key));
  document.querySelector(`.vet-card[data-key="${key}"]`)?.scrollIntoView({block:'nearest',behavior:'smooth'});
}

// ── Haversine ─────────────────────────────────
function dist(lat1,lon1,lat2,lon2) {
  const R=6371, dL=(lat2-lat1)*Math.PI/180, dO=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(d) { return d < 1 ? (d*1000).toFixed(0)+' m' : d.toFixed(1)+' km'; }

// ── Apply filters & render ─────────────────────
function applyFilters() {
  const q    = document.getElementById('search').value.toLowerCase().trim();
  const sort = document.getElementById('sort-sel').value;

  let locs = LOCS.map(l => ({...l,
    _dist: distFilter ? dist(distFilter.lat, distFilter.lon, l.lat, l.lon) : null
  }));

  // category
  if (activeCats.size < Object.keys(CAT).length)
    locs = locs.filter(l => activeCats.has(l.kategorie));

  // text search
  if (q) locs = locs.filter(l =>
    (l.doktor||'').toLowerCase().includes(q) ||
    (l.nazev||'').toLowerCase().includes(q)  ||
    (l.adresa||'').toLowerCase().includes(q) ||
    (l.id||'').toLowerCase().includes(q)
  );

  // distance radius
  if (distFilter)
    locs = locs.filter(l => l._dist <= distFilter.km);

  // map bounds filter
  if (mapFilterActive) {
    const b = map.getBounds();
    locs = locs.filter(l => b.contains([l.lat, l.lon]));
  }

  // sort
  if (sort==='dist' && distFilter)
    locs.sort((a,b) => a._dist - b._dist);
  else
    locs.sort((a,b) => (a.doktor||'').localeCompare(b.doktor||'','cs'));

  // show/hide markers (use _key – unique per entry, id is not unique across sheets)
  const visibleKeys = new Set(locs.map(l=>l._key));
  LOCS.forEach(loc => {
    const show = visibleKeys.has(loc._key);
    if (show && !map.hasLayer(markers[loc._key]))  markers[loc._key].addTo(map);
    if (!show && map.hasLayer(markers[loc._key]))  map.removeLayer(markers[loc._key]);
  });

  renderList(locs);
  document.getElementById('header-count').textContent = locs.length + ' / ' + LOCS.length + ' praxí';
  const tabLabel = document.getElementById('tab-list-label');
  if (tabLabel) tabLabel.textContent = `Seznam (${locs.length})`;
}

function renderList(locs) {
  const wrap = document.getElementById('list-wrap');
  document.getElementById('result-count').textContent =
    `Zobrazeno ${locs.length} z ${LOCS.length} pracovišť`;

  if (!locs.length) {
    wrap.innerHTML = '<div class="no-results">Žádné výsledky<br><small>Zkus jiný výraz nebo filtr.</small></div>';
    return;
  }

  wrap.innerHTML = locs.map(loc => {
    const cat = CAT[loc.kategorie]||{};
    const distBadge = loc._dist != null
      ? `<span class="dist-badge">📍 ${fmtDist(loc._dist)}</span>` : '';
    const tel  = loc.telefon && loc.telefon!='None' && loc.telefon ? `<a href="tel:${loc.telefon}">📞 ${loc.telefon}</a>` : '';
    const mail = loc.email   && loc.email!='None'   && loc.email   ? `<a href="mailto:${loc.email}">✉️ Email</a>` : '';
    const web  = loc.web     && loc.web.startsWith('http')          ? `<a href="${loc.web}" target="_blank" rel="noopener">🌐 Web</a>` : '';
    const links = (tel||mail||web) ? `<div class="card-links">${tel}${mail}${web}</div>` : '';
    return `<div class="vet-card${activeId===loc._key?' selected':''}" data-key="${loc._key}"
        style="border-left-color:${cat.marker||'#9fa8da'}"
        onclick="setActive(${loc._key})">
      <div class="card-name">${loc.doktor}</div>
      ${loc.nazev && loc.nazev !== loc.doktor && loc.nazev !== 'None' ? `<div class="card-clinic">${loc.nazev}</div>` : ''}
      <div class="card-addr">📍 ${loc.adresa}</div>
      <div class="card-meta">
        <span class="cat-badge" style="background:${cat.bg||'#eee'};color:${cat.color||'#333'}">${cat.label||''}</span>
        ${distBadge}
        <span class="contract-badge">${loc.id}</span>
      </div>
      ${links}
    </div>`;
  }).join('');
}

// ── Geocode helper ────────────────────────────
async function geocodeAddr(addr) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(addr)}`;
  const r = await fetch(url, {headers:{'User-Agent':'vet-praxe-mapa/1.0'}});
  const d = await r.json();
  return d.length ? {lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon), label: d[0].display_name} : null;
}

function setRefPoint(lat, lon, label) {
  distFilter = {lat, lon, km: parseFloat(document.getElementById('dist-km').value)||50};
  document.getElementById('sort-sel').value = 'dist';
  if (userMarker) userMarker.remove();
  userMarker = L.marker([lat,lon], {
    icon: L.divIcon({
      html:`<div style="width:18px;height:18px;background:#d32f2f;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>`,
      className:'', iconSize:[18,18], iconAnchor:[9,9]
    })
  }).addTo(map).bindPopup(`<b>Vaše místo</b><br><small>${label||''}</small>`).openPopup();
  if (distCircle) distCircle.remove();
  distCircle = L.circle([lat,lon], {radius:distFilter.km*1000, color:'#3f51b5', fillOpacity:.06, weight:1.5}).addTo(map);
  map.setView([lat,lon], 9);
  document.getElementById('dist-info').style.display = 'block';
  document.getElementById('dist-info').textContent = `📍 Bod: ${label ? label.split(',')[0] : lat.toFixed(4)+', '+lon.toFixed(4)} · max. ${distFilter.km} km`;
  applyFilters();
}

document.getElementById('apply-dist').addEventListener('click', async () => {
  const val = document.getElementById('dist-input').value.trim();
  if (!val) { alert('Zadej město nebo adresu.'); return; }
  const res = await geocodeAddr(val);
  if (!res) { alert('Adresu se nepodařilo najít.'); return; }
  setRefPoint(res.lat, res.lon, val);
});

document.getElementById('dist-input').addEventListener('keydown', e => {
  if (e.key==='Enter') document.getElementById('apply-dist').click();
});

document.getElementById('gps-btn').addEventListener('click', () => {
  navigator.geolocation.getCurrentPosition(
    p => setRefPoint(p.coords.latitude, p.coords.longitude, 'Vaše GPS poloha'),
    () => alert('GPS polohu se nepodařilo zjistit.')
  );
});

document.getElementById('clear-dist').addEventListener('click', () => {
  distFilter = null;
  if (userMarker) { userMarker.remove(); userMarker=null; }
  if (distCircle) { distCircle.remove(); distCircle=null; }
  document.getElementById('dist-info').style.display = 'none';
  document.getElementById('dist-input').value = '';
  applyFilters();
});

// ── Category buttons ──────────────────────────
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const cat = btn.dataset.cat;
    if (cat === 'all') {
      const allOn = activeCats.size === Object.keys(CAT).length;
      if (allOn) {
        activeCats.clear();
        document.querySelectorAll('.cat-btn:not([data-cat=all])').forEach(b=>b.classList.remove('active'));
        btn.classList.remove('active');
      } else {
        activeCats = new Set(Object.keys(CAT));
        document.querySelectorAll('.cat-btn').forEach(b=>b.classList.add('active'));
      }
    } else {
      if (activeCats.has(cat)) { activeCats.delete(cat); btn.classList.remove('active'); }
      else                     { activeCats.add(cat);    btn.classList.add('active'); }
      const allBtn = document.querySelector('.cat-btn[data-cat=all]');
      allBtn.classList.toggle('active', activeCats.size===Object.keys(CAT).length);
    }
    applyFilters();
  });
});

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('sort-sel').addEventListener('change', applyFilters);

document.getElementById('map-filter-toggle').addEventListener('change', e => {
  mapFilterActive = e.target.checked;
  applyFilters();
});
map.on('moveend zoomend', () => { if (mapFilterActive) applyFilters(); });

// ── Mobile tab switching ──────────────────────
function switchTab(tab) {
  const main = document.getElementById('main');
  main.classList.toggle('show-list', tab === 'list');
  document.getElementById('tab-map').classList.toggle('active', tab === 'map');
  document.getElementById('tab-list').classList.toggle('active', tab === 'list');
  if (tab === 'map') map.invalidateSize();
  showHeader();
}

// ── Mobile header auto-hide ───────────────────
let _headerTimer = null;
function showHeader() {
  if (window.innerWidth > 700) return;
  const h = document.getElementById('header');
  h.classList.remove('hidden');
  document.getElementById('app').classList.remove('header-hidden');
  clearTimeout(_headerTimer);
  _headerTimer = setTimeout(hideHeader, 4000);
}
function hideHeader() {
  const h = document.getElementById('header');
  h.classList.add('hidden');
  // after transition ends, collapse the space
  h.addEventListener('transitionend', () => {
    if (h.classList.contains('hidden'))
      document.getElementById('app').classList.add('header-hidden');
  }, {once: true});
}
function initHeaderAutoHide() {
  if (window.innerWidth > 700) return;
  // set exact header height as CSS var so padding matches
  const h = document.getElementById('header');
  const setH = () => document.getElementById('app').style.setProperty('--mob-header-h', h.offsetHeight + 'px');
  setH();
  h.addEventListener('click', showHeader);
  _headerTimer = setTimeout(hideHeader, 4000);
}

// ── Boot ──────────────────────────────────────
initMarkers();
applyFilters();
initHeaderAutoHide();
</script>
</body>
</html>
